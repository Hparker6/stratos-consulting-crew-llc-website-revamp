<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stratos Consulting Crew | Analytics &amp; Dashboards for Distributors</title>
    <meta name="description" content="We help small distributors and manufacturers cut costs, optimize inventory, and make smarter decisions with Power BI dashboards, forecasting, and automation. Book a free discovery call." />
    <link rel="canonical" href="https://www.stratosconsultingcrew.com" />
    <!-- Self-hosted fonts. Preloading these two measured CLS 0.000 (vs ~0.039
         without). JetBrains Mono is not preloaded: eyebrow labels only. -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/space-grotesk-latin-wght-normal.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/manrope-latin-wght-normal.woff2" crossorigin />
    <!--
      Consent Mode v2 defaults — pushed before any tag can load. No analytics
      script (GA4/GTM/Clarity) is injected until the visitor grants consent;
      see src/lib/analytics.ts for the loader and configuration.
    -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        analytics_storage: 'denied',
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        wait_for_update: 500
      });
    </script>
    <!-- Structured data + canonical/OG/Twitter are generated per route in
         src/lib/schema.ts + src/lib/seo.ts and baked in by the prerenderer. -->

  </head>
  <body>
    <!-- Static shadow form so Netlify's build bots detect the React-rendered contact form -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="text" name="company" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <textarea name="challenge"></textarea>
      <input type="text" name="bot-field" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
