[build]
  command = "npm run build"
  publish = "dist"

# --- Legacy URLs from the earlier site structure -----------------------------
# Handled server-side with 301s so link equity actually transfers and Google
# drops the old URLs. (App.tsx also handles them client-side for in-app nav.)
[[redirects]]
  from = "/dashboards"
  to = "/solutions"
  status = 301

[[redirects]]
  from = "/problems"
  to = "/solutions"
  status = 301

[[redirects]]
  from = "/problems/*"
  to = "/solutions"
  status = 301

# --- 404 ---------------------------------------------------------------------
# Every real route is prerendered to a static file (dist/<route>/index.html), and
# Netlify serves matching files BEFORE evaluating redirects. So anything reaching
# this rule genuinely does not exist, and gets a real 404 status.
#
# This replaces the old `/* -> /index.html  200` SPA fallback, which returned
# HTTP 200 for every typo'd or stale URL. Google treats those as soft 404s and
# can index them; they also hide broken internal links, because nothing ever
# reports an error.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # script/connect/img sources cover GA4, GTM, and Microsoft Clarity,
    # all consent-gated in src/lib/analytics.ts.
    # Fonts are self-hosted, so fonts.googleapis.com / fonts.gstatic.com have been
    # dropped from style-src and font-src entirely — two fewer third-party origins
    # the browser is permitted to talk to.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.clarity.ms https://scripts.clarity.ms; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https://www.googletagmanager.com https://*.google-analytics.com https://*.clarity.ms; connect-src 'self' https://*.google-analytics.com https://*.analytics.google.com https://*.googletagmanager.com https://*.clarity.ms https://c.bing.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests"

# Hashed build assets never change — cache forever
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Self-hosted fonts are content-stable (a change means a new filename) — cache forever
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images and static files — cache one week, revalidate after
[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"
